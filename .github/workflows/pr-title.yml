name: PR Title

on:
  pull_request:
    branches: [master]
    types: [opened, edited, labeled, reopened, ready_for_review, synchronize, unlabeled]

permissions:
  contents: read

jobs:
  conventional-title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate squash-merge title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          allowed_types='feat|fix|perf|docs|ci|test|chore|refactor|build|deps'
          pattern="^(${allowed_types})(\([A-Za-z0-9._/-]+\))?!?: [^[:space:]].*"

          if [[ ! "${PR_TITLE}" =~ ${pattern} ]]; then
            printf 'PR title must follow Conventional Commits so squash merges produce useful release metadata.\n' >&2
            printf 'Allowed types: feat, fix, perf, docs, ci, test, chore, refactor, build, deps.\n' >&2
            printf 'Examples: fix(release): add release workflow, feat!: remove legacy config.\n' >&2
            printf 'Actual title: %s\n' "${PR_TITLE}" >&2
            exit 1
          fi

  cargo-version-guard:
    name: Cargo version guard
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'release-plz-') && !contains(github.event.pull_request.labels.*.name, 'manual-version') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Block manual release version edits
        run: python3 .github/scripts/check_cargo_version_edits.py --base HEAD^1 --head HEAD
