name: Release-plz

# Release flow: release-plz tags + creates the GitHub release, then the wheel
# matrix builds sase-core-rs distributions at that tag and publishes them to
# PyPI. Publishing is self-healing: every push and the scheduled run gate the
# build/publish jobs on "the tagged version is missing from PyPI" rather than
# "a release was created in this exact run", so a run that dies between
# tagging and publishing (runner starvation, discarded queued jobs, transient
# failures) is retried automatically by the next run instead of leaving the
# version tagged but unpublished forever (which is how v0.6.0 got stuck).
on:
  push:
    branches: [master]
  schedule:
    # Heal missed publishes even when no push arrives.
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run release-plz release in dry-run mode and skip release PR/publish.
        type: boolean
        default: true
      build_wheels:
        description: Build the wheel matrix even if no release was created.
        type: boolean
        default: false
      publish_pypi:
        description: Publish built artifacts to PyPI for guarded manual recovery.
        type: boolean
        default: false
      expected_version:
        description: Expected package version for guarded manual PyPI publish.
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always
  MATURIN_VERSION: "1.7"

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'sase-org' }}
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-plz
          workspaces: ". -> target"

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
          dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.SASE_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Print release-plz release output
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
          RELEASES_CREATED: ${{ steps.release-plz.outputs.releases_created }}
        run: |
          echo "releases_created: ${RELEASES_CREATED}"
          echo "releases: ${RELEASES}"

  # Decides whether the wheel matrix and PyPI publish need to run. Runs after
  # release-plz so a tag created moments ago in this run is already visible.
  # needs_publish is true when the workspace version has a release tag but no
  # matching release on PyPI — regardless of which run created the tag.
  publish-plan:
    name: Publish plan
    needs: release-plz-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.repository_owner == 'sase-org' }}
    outputs:
      version: ${{ steps.plan.outputs.version }}
      needs_publish: ${{ steps.plan.outputs.needs_publish }}
      build_ref: ${{ steps.plan.outputs.build_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Compute publish plan
        id: plan
        env:
          EXPECTED_VERSION_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_version || '' }}
        run: |
          set -euo pipefail

          # release-plz keeps sase_core and sase_core_py in one version_group
          # and both inherit [workspace.package].version, so the workspace
          # version IS the sase-core-rs distribution version.
          version="$(python3 - <<'PY'
          import tomllib

          with open("Cargo.toml", "rb") as handle:
              print(tomllib.load(handle)["workspace"]["package"]["version"])
          PY
          )"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code origin "refs/tags/v${version}" >/dev/null; then
            tag_exists=true
          else
            tag_exists=false
          fi

          pypi_state="$(python3 - "$version" <<'PY'
          import sys
          import urllib.error
          import urllib.request

          version = sys.argv[1]
          url = f"https://pypi.org/pypi/sase-core-rs/{version}/json"
          request = urllib.request.Request(url, headers={"Accept": "application/json"})
          try:
              with urllib.request.urlopen(request, timeout=30):
                  print("published")
          except urllib.error.HTTPError as error:
              if error.code != 404:
                  raise
              print("absent")
          PY
          )"

          if [[ "${tag_exists}" == "true" && "${pypi_state}" == "absent" ]]; then
            needs_publish=true
          else
            needs_publish=false
          fi
          echo "needs_publish=${needs_publish}" >> "$GITHUB_OUTPUT"

          # Build from the release tag so post-release commits on master can
          # never leak into the published artifacts. Empty means "the pushed
          # commit", which only manual wheel test builds fall back to.
          if [[ -n "${EXPECTED_VERSION_INPUT}" ]]; then
            build_ref="v${EXPECTED_VERSION_INPUT}"
          elif [[ "${needs_publish}" == "true" ]]; then
            build_ref="v${version}"
          else
            build_ref=""
          fi
          echo "build_ref=${build_ref}" >> "$GITHUB_OUTPUT"

          echo "version=${version} tag_exists=${tag_exists} pypi=${pypi_state} needs_publish=${needs_publish} build_ref=${build_ref}"

  linux:
    name: linux ${{ matrix.target }}
    needs: [release-plz-release, publish-plan]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.repository_owner == 'sase-org' && ((github.event_name != 'workflow_dispatch' && needs.publish-plan.outputs.needs_publish == 'true') || (github.event_name == 'workflow_dispatch' && inputs.build_wheels)) }}
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.publish-plan.outputs.build_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-linux-${{ matrix.target }}
          workspaces: ". -> target"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: crates/sase_core_py
          args: --release --out dist --strip
          manylinux: "2_28"

      - name: Smoke test (x86_64 only)
        if: matrix.target == 'x86_64'
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install crates/sase_core_py/dist/*.whl
          /tmp/smoke/bin/python -c "import sase_core_rs; print('import ok')"
          /tmp/smoke/bin/python -c "import sase_core_rs; print('parse_query ok:', sase_core_rs.parse_query('status:Ready'))"
          /tmp/smoke/bin/python - <<'PY'
          import sase_core_rs
          try:
              sase_core_rs.parse_query('(')
          except ValueError as e:
              print('expected ValueError on bad query:', e)
          else:
              raise SystemExit('parse_query("(") should have raised ValueError')
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/sase_core_py/dist

  macos:
    name: macos universal2
    needs: [release-plz-release, publish-plan]
    runs-on: macos-latest
    timeout-minutes: 45
    if: ${{ github.repository_owner == 'sase-org' && ((github.event_name != 'workflow_dispatch' && needs.publish-plan.outputs.needs_publish == 'true') || (github.event_name == 'workflow_dispatch' && inputs.build_wheels)) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.publish-plan.outputs.build_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-universal2
          workspaces: ". -> target"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: universal2-apple-darwin
          working-directory: crates/sase_core_py
          args: --release --out dist --strip

      - name: Smoke test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install crates/sase_core_py/dist/*.whl
          /tmp/smoke/bin/python -c "import sase_core_rs; print(sase_core_rs.parse_query('status:Ready'))"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-universal2
          path: crates/sase_core_py/dist

  windows:
    name: windows x86_64
    needs: [release-plz-release, publish-plan]
    runs-on: windows-latest
    timeout-minutes: 45
    if: ${{ github.repository_owner == 'sase-org' && ((github.event_name != 'workflow_dispatch' && needs.publish-plan.outputs.needs_publish == 'true') || (github.event_name == 'workflow_dispatch' && inputs.build_wheels)) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.publish-plan.outputs.build_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows-x64
          workspaces: ". -> target"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          working-directory: crates/sase_core_py
          args: --release --out dist --strip

      - name: Smoke test
        shell: pwsh
        run: |
          python -m venv $env:TEMP\smoke
          & $env:TEMP\smoke\Scripts\python.exe -m pip install --upgrade pip
          $wheel = Get-ChildItem crates\sase_core_py\dist\*.whl | Select-Object -First 1
          & $env:TEMP\smoke\Scripts\python.exe -m pip install $wheel.FullName
          & $env:TEMP\smoke\Scripts\python.exe -c "import sase_core_rs; print(sase_core_rs.parse_query('status:Ready'))"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: crates/sase_core_py/dist

  sdist:
    name: sdist
    needs: [release-plz-release, publish-plan]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.repository_owner == 'sase-org' && ((github.event_name != 'workflow_dispatch' && needs.publish-plan.outputs.needs_publish == 'true') || (github.event_name == 'workflow_dispatch' && inputs.build_wheels)) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.publish-plan.outputs.build_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/sase_core_py
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/sase_core_py/dist

  metadata-check:
    name: twine check
    needs: [publish-plan, linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.repository_owner == 'sase-org' && ((github.event_name != 'workflow_dispatch' && needs.publish-plan.outputs.needs_publish == 'true') || (github.event_name == 'workflow_dispatch' && inputs.build_wheels)) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install --quiet twine
      - run: ls -la dist
      - run: twine check dist/*

  publish:
    name: publish to PyPI
    needs: [publish-plan, metadata-check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'sase-org' && ((github.event_name != 'workflow_dispatch' && needs.publish-plan.outputs.needs_publish == 'true') || (github.event_name == 'workflow_dispatch' && inputs.build_wheels == true && inputs.publish_pypi == true && inputs.dry_run == false)) }}
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Guard PyPI publish
        env:
          EXPECTED_VERSION_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_version || '' }}
          PLAN_VERSION: ${{ needs.publish-plan.outputs.version }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "PyPI publish must run from refs/heads/master; got ${GITHUB_REF}" >&2
            exit 1
          fi

          if [[ "${IS_MANUAL}" == "true" ]]; then
            if [[ -z "${EXPECTED_VERSION_INPUT}" ]]; then
              echo "expected_version is required for manual PyPI publish" >&2
              exit 1
            fi
            EXPECTED_VERSION="${EXPECTED_VERSION_INPUT}"
          else
            EXPECTED_VERSION="${PLAN_VERSION}"
          fi
          export EXPECTED_VERSION

          git fetch --force --tags origin
          if ! tag_commit="$(git rev-parse --verify --quiet "v${EXPECTED_VERSION}^{commit}")"; then
            echo "release tag v${EXPECTED_VERSION} does not exist; refusing to publish" >&2
            exit 1
          fi
          echo "verified release tag v${EXPECTED_VERSION} resolves to ${tag_commit}"

          python - <<'PY'
          import email.parser
          import os
          import pathlib
          import tarfile
          import zipfile

          expected_version = os.environ["EXPECTED_VERSION"]
          expected_name = "sase-core-rs"
          dist = pathlib.Path("dist")
          files = [path for path in sorted(dist.iterdir()) if path.is_file()]
          if not files:
              raise SystemExit("dist/ contains no files")

          def read_metadata(path: pathlib.Path) -> str:
              if path.suffix == ".whl":
                  with zipfile.ZipFile(path) as archive:
                      metadata_names = [
                          name
                          for name in archive.namelist()
                          if name.endswith(".dist-info/METADATA")
                      ]
                      if len(metadata_names) != 1:
                          raise SystemExit(
                              f"{path}: expected one wheel METADATA file, found {len(metadata_names)}"
                          )
                      return archive.read(metadata_names[0]).decode("utf-8")

              if path.name.endswith(".tar.gz"):
                  with tarfile.open(path, "r:gz") as archive:
                      metadata_members = [
                          member
                          for member in archive.getmembers()
                          if member.isfile() and member.name.endswith("PKG-INFO")
                      ]
                      if len(metadata_members) != 1:
                          raise SystemExit(
                              f"{path}: expected one sdist PKG-INFO file, found {len(metadata_members)}"
                          )
                      extracted = archive.extractfile(metadata_members[0])
                      if extracted is None:
                          raise SystemExit(f"{path}: could not read sdist PKG-INFO")
                      return extracted.read().decode("utf-8")

              raise SystemExit(f"{path}: unsupported distribution file")

          for path in files:
              metadata = email.parser.Parser().parsestr(read_metadata(path))
              name = metadata.get("Name")
              version = metadata.get("Version")
              if name != expected_name or version != expected_version:
                  raise SystemExit(
                      f"{path}: expected Name={expected_name!r} Version={expected_version!r}, "
                      f"got Name={name!r} Version={version!r}"
                  )
              print(f"verified {path}: {name} {version}")
          PY

      # skip-existing keeps retries and partial-upload recovery idempotent:
      # PyPI rejects duplicate filenames anyway, so re-running a heal can only
      # top up files that are genuinely missing.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  release-plz-pr:
    name: Release-plz PR
    needs: release-plz-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'sase-org' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-plz
          workspaces: ". -> target"

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.SASE_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Print release-plz PR output
        env:
          PR: ${{ steps.release-plz.outputs.pr }}
          PRS_CREATED: ${{ steps.release-plz.outputs.prs_created }}
        run: |
          echo "prs_created: ${PRS_CREATED}"
          echo "pr: ${PR}"
